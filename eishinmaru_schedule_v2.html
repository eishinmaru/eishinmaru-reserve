<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栄真丸 出船スケジュール</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f7fa;color:#333;}
.header{width:100%;line-height:0;overflow:hidden;background:#1c4587;}
.header img{width:100%;height:auto;display:block;}
.tab-bar{display:flex;background:#15376e;border-bottom:2px solid #0f2a55;}
.tab-btn{flex:1;padding:12px 0;background:none;border:none;color:#7fabd4;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;}
.tab-btn.active{color:white;border-bottom:3px solid #5bc4f5;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.month-nav{background:white;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e0e6ed;position:sticky;top:0;z-index:10;}
.month-nav button{background:#f0f4f8;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:#1c4587;font-weight:500;}
.current-month{font-size:17px;font-weight:600;color:#1c4587;}

.calendar-wrapper{background:white;margin:8px;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.weekday-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid #e0e6ed;}
.weekday-cell{text-align:center;padding:10px 0;font-size:12px;font-weight:600;color:#555;}
.weekday-cell.sun{color:#d32f2f;}.weekday-cell.sat{color:#1976d2;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.day-cell{border-right:1px solid #f0f4f8;border-bottom:1px solid #f0f4f8;min-height:76px;padding:4px 3px 2px;cursor:pointer;transition:background .15s;}
.day-cell:hover{background:#f0f7ff;}
.day-cell:nth-child(7n){border-right:none;}
.day-cell.other-month{background:#fafbfc;color:#ccc;cursor:default;pointer-events:none;}
.day-number{font-size:13px;font-weight:500;color:#333;display:block;margin-bottom:2px;}
.day-cell.sun .day-number{color:#d32f2f;}.day-cell.sat .day-number{color:#1976d2;}
.day-cell.today .day-number{background:#1c4587;color:white;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;}
.mini-events{display:flex;flex-direction:column;gap:2px;}
.mini-event{font-size:9px;padding:1px 3px;border-radius:2px;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.mini-event.recruiting{background:#1976d2;}.mini-event.confirmed{background:#2e7d32;}
.mini-event.full{background:#c62828;}.mini-event.charter{background:#e65100;}
.mini-event.cancelled{background:#9e9e9e;}
.holiday-mark{font-size:15px;font-weight:700;color:#d32f2f;display:flex;align-items:center;justify-content:center;height:50px;}
.mini-events{display:none;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;}
.modal-overlay.active{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:white;width:100%;max-width:500px;border-radius:18px 18px 0 0;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease-out;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{background:linear-gradient(135deg,#1c4587,#2a5fa0);color:white;padding:18px 20px;position:relative;border-radius:18px 18px 0 0;}
.modal-header.sat{background:linear-gradient(135deg,#1565c0,#2a7cd1);}
.modal-header.sun{background:linear-gradient(135deg,#b71c1c,#e53935);}
.modal-header.holiday{background:linear-gradient(135deg,#616161,#9e9e9e);}
.modal-date{font-size:22px;font-weight:700;}.modal-weekday{font-size:15px;color:#c7ddfa;margin-left:6px;}
.modal-close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-slot-count{font-size:11px;color:#c7ddfa;margin-top:4px;}
.modal-body{padding:12px;background:#f8fafc;}
.slot-card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;border-left:5px solid #1c4587;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.slot-card.confirmed{border-left-color:#2e7d32;}
.slot-card.full{border-left-color:#c62828;background:#fff8f8;}
.slot-card.charter{border-left-color:#e65100;background:#fff9f5;}
.slot-card.cancelled{border-left-color:#9e9e9e;background:#f7f7f7;opacity:.75;}
.slot-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.slot-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;flex-shrink:0;background:#1c4587;}
.slot-num.confirmed{background:#2e7d32;}.slot-num.full{background:#c62828;}
.slot-num.charter{background:#e65100;}.slot-num.cancelled{background:#9e9e9e;}
.slot-info{flex:1;}
.slot-target{font-size:17px;font-weight:700;color:#1c4587;}
.slot-card.confirmed .slot-target{color:#2e7d32;}
.slot-card.full .slot-target{color:#c62828;}
.slot-card.charter .slot-target{color:#e65100;}
.slot-card.cancelled .slot-target{color:#9e9e9e;text-decoration:line-through;}
.slot-time{font-size:12px;color:#777;margin-top:2px;}
.badges{margin-bottom:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-right:4px;}
.badge.recruiting{background:#e3f2fd;color:#1565c0;}
.badge.confirmed{background:#e8f5e9;color:#2e7d32;}
.badge.full{background:#ffebee;color:#c62828;}
.badge.charter{background:#fff3e0;color:#e65100;}
.status-box{background:#f0f4f8;border-radius:8px;padding:10px 12px;}
.status-box.full{background:#ffebee;}.status-box.confirmed{background:#e8f5e9;}.status-box.charter{background:#fff3e0;}
.status-label{font-size:11px;color:#888;margin-bottom:3px;}
.status-main{font-size:15px;font-weight:700;color:#333;}
.status-box.full .status-main{color:#c62828;}
.status-box.confirmed .status-main{color:#2e7d32;}
.status-box.charter .status-main{color:#e65100;}
.progress-bar{background:#dde3ea;height:7px;border-radius:4px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#1976d2,#64b5f6);}
.progress-fill.confirmed{background:linear-gradient(90deg,#2e7d32,#66bb6a);}
.holiday-body{text-align:center;padding:50px 20px;color:#aaa;}
.period-header{font-size:16px;font-weight:800;padding:10px 16px;margin:8px 0 8px;border-radius:8px;letter-spacing:2px;}
.period-header.am{background:#1c4587;color:white;}
.period-header.pm{background:#e65100;color:white;}
.slot-card.empty-slot{border-left-color:#1976d2;background:#f0f6ff;}
.slot-num.empty{background:#1976d2;}
.empty-text{color:#1565c0;font-weight:700;}
.holiday-body .icon{font-size:48px;margin-bottom:12px;}
.holiday-body .text{font-size:16px;font-weight:500;}
.admin-lock{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 30px;text-align:center;}
.lock-icon{font-size:52px;margin-bottom:16px;}
.admin-lock h2{font-size:18px;color:#1c4587;margin-bottom:8px;}
.admin-lock p{font-size:13px;color:#888;margin-bottom:20px;}
.admin-lock input{width:100%;max-width:280px;padding:12px 16px;border:2px solid #d0d9e8;border-radius:8px;font-size:15px;margin-bottom:12px;text-align:center;outline:none;letter-spacing:4px;}
.admin-lock input:focus{border-color:#1c4587;}
.btn-primary{background:#1c4587;color:white;border:none;padding:12px 30px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:280px;}
.lock-error{color:#c62828;font-size:13px;margin-top:8px;}
.admin-panel{padding:12px;}
.admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;background:white;padding:10px 14px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.admin-month-label{font-size:16px;font-weight:700;color:#1c4587;margin-bottom:6px;}
.admin-month-nav{display:flex;gap:8px;}
.admin-month-nav button{background:#f0f4f8;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:#1c4587;font-weight:500;}
.logout-btn{background:#f0f4f8;border:none;padding:6px 12px;border-radius:6px;font-size:12px;color:#666;cursor:pointer;}
.admin-cal-wrap{background:white;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:12px;}
.admin-day-cell{border-right:1px solid #f0f4f8;border-bottom:1px solid #f0f4f8;min-height:64px;padding:4px 3px;cursor:pointer;transition:background .15s;}
.admin-day-cell:hover{background:#e8f4ff;}
.admin-day-cell.selected{background:#dbeeff;box-shadow:inset 0 0 0 2px #1c4587;}
.admin-day-cell:nth-child(7n){border-right:none;}
.edit-area{background:white;border-radius:12px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.06);margin-bottom:12px;}
.edit-area-title{font-size:16px;font-weight:700;color:#1c4587;margin-bottom:4px;}
.edit-area-sub{font-size:12px;color:#888;margin-bottom:14px;}
.holiday-toggle{display:flex;align-items:center;gap:10px;background:#f8fafc;border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.toggle-switch{position:relative;width:44px;height:24px;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:24px;transition:.3s;}
.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
.toggle-switch input:checked + .toggle-slider{background:#c62828;}
.toggle-switch input:checked + .toggle-slider:before{transform:translateX(20px);}
.slot-edit-card{background:#f8fafc;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #e0e6ed;}
.slot-edit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.slot-edit-num{background:#1c4587;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.slot-remove-btn{background:#ffebee;color:#c62828;border:none;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px;}
.form-group label{font-size:11px;color:#888;font-weight:500;}
.form-group select,.form-group input{padding:8px 10px;border:1.5px solid #d0d9e8;border-radius:7px;font-size:13px;color:#333;background:white;outline:none;}
.form-group select:focus,.form-group input:focus{border-color:#1c4587;}
.add-slot-btn{display:none;}
.save-btn{width:100%;padding:13px;background:#1c4587;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.save-btn:hover{background:#15376e;}
.edit-period-header{font-size:14px;font-weight:700;padding:8px 12px;border-radius:6px;margin:12px 0 8px;letter-spacing:1px;}
.edit-period-header.am{background:#e3f2fd;color:#1565c0;}
.edit-period-header.pm{background:#fff3e0;color:#e65100;}
.add-slot-mini-btn{width:100%;padding:9px;background:#f0f4f8;border:2px dashed #b0bec5;border-radius:8px;color:#6b7c93;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;}
.pm-btn{border-color:#e65100;color:#e65100;background:#fff9f5;}
.save-toast{display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2e7d32;color:white;padding:10px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.save-toast.show{display:block;animation:toastIn .3s;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.footer{text-align:center;padding:20px;font-size:11px;color:#bbb;}
.slot-action-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;margin-left:6px;}
.slot-btn{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;text-align:center;text-decoration:none;display:block;white-space:nowrap;}
.tel-btn{background:#2e7d32;color:white;}
.web-btn{background:#1c4587;color:white;}
</style>
</head>

const STATUS_LIST=[{v:"recruiting",l:"出船未確定"},{v:"confirmed",l:"出船確定"},{v:"full",l:"満船"},{v:"charter",l:"貸切"},{v:"cancelled",l:"中止"}];

function getMiniClass(st){
  if(st==='full')return 'full';
  if(st==='charter')return 'charter';
  if(st==='cancelled')return 'cancelled';
  if(st==='confirmed')return 'confirmed';
  return 'recruiting';
}

  const today=new Date();
  let html='';
  for(let i=fd-1;i>=0;i--){
    html+='<div class="day-cell other-month"><span class="day-number">'+(pl-i)+'</span></div>';
  }
  for(let d=1;d<=ld;d++){
    const key=currentYear+'-'+String(currentMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const data=scheduleData[key];
    const dow=new Date(currentYear,currentMonth-1,d).getDay();
    const isToday=today.getFullYear()===currentYear&&today.getMonth()+1===currentMonth&&today.getDate()===d;
    const cls=['day-cell',dow===0?'sun':'',dow===6?'sat':'',isToday?'today':''].filter(Boolean).join(' ');
    let inner='';
    if(data){

        inner='<div class="holiday-mark">休</div>';

  }

  const tmp=document.createElement('div');
  tmp.innerHTML=html;
  while(tmp.firstChild)grid.insertBefore(tmp.firstChild,grid.firstChild);
  // 次月セルを末尾に
  const tmp2=document.createElement('div');
  tmp2.innerHTML=html.replace(/\d+/g,'');
  // シンプルに再構築
}

function buildCalendar(){
  document.getElementById('current-month-label').textContent=currentYear+'年 '+currentMonth+'月';
  const grid=document.getElementById('calendar-grid');
  grid.innerHTML='';
  const fd=new Date(currentYear,currentMonth-1,1).getDay();
  const ld=new Date(currentYear,currentMonth,0).getDate();
  const pl=new Date(currentYear,currentMonth-1,0).getDate();
  const today=new Date();
  // 前月の余白
  for(let i=fd-1;i>=0;i--){
    const cell=document.createElement('div');
    cell.className='day-cell other-month';
    cell.innerHTML='<span class="day-number">'+(pl-i)+'</span>';
    grid.appendChild(cell);
  }
  // 当月
  for(let d=1;d<=ld;d++){
    const key=currentYear+'-'+String(currentMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const data=scheduleData[key];
    const dow=new Date(currentYear,currentMonth-1,d).getDay();
    const isToday=today.getFullYear()===currentYear&&today.getMonth()+1===currentMonth&&today.getDate()===d;
    const cls=['day-cell',dow===0?'sun':'',dow===6?'sat':'',isToday?'today':''].filter(Boolean).join(' ');
    let inner='<span class="day-number">'+d+'</span>';
    if(data){
      if(data.type==='holiday'){
        inner+='<div class="holiday-mark">休</div>';
      }
    }
    const cell=document.createElement('div');
    cell.className=cls;
    cell.innerHTML=inner;
    cell.addEventListener('click',(function(k){return function(){openModal(k);};})(key));
    grid.appendChild(cell);
  }
  // 次月の余白
  const rem=(7-((fd+ld)%7))%7;
  for(let i=1;i<=rem;i++){
    const cell=document.createElement('div');
    cell.className='day-cell other-month';
    cell.innerHTML='<span class="day-number">'+i+'</span>';
    grid.appendChild(cell);
  }
}

function openModal(key){
  scheduleData=loadData();
  const data=scheduleData[key];
  const pts=key.split('-');
  const m=parseInt(pts[1]),d=parseInt(pts[2]);
  const dow=new Date(parseInt(pts[0]),m-1,d).getDay();
  const wdL=['日','月','火','水','木','金','土'];
  document.getElementById('modal-date').textContent=m+'月'+d+'日';
  document.getElementById('modal-weekday').textContent='('+wdL[dow]+')';
  const hdr=document.getElementById('modal-header');
  hdr.className='modal-header';
  if(dow===6)hdr.classList.add('sat');
  if(dow===0)hdr.classList.add('sun');
  // 休みの日のみ休表示、それ以外はデータなくても全便募集中
  if(data&&data.type==='holiday'){
    hdr.classList.add('holiday');
    document.getElementById('modal-slot-count').textContent='お休み';
    document.getElementById('modal-body').innerHTML='<div class="holiday-body"><div class="icon"></div><div class="text">本日はお休みです</div></div>';
    document.getElementById('modal-overlay').classList.add('active');
    return;
  }
  const slots=(data&&data.slots)||[];
  const amSlots=slots.filter(function(s){return s.period==='am';});
  const pmSlots=slots.filter(function(s){return s.period==='pm';});
  const totalCount=amSlots.length+pmSlots.length;
  document.getElementById('modal-slot-count').textContent='出船予定 '+totalCount+'便（午前'+amSlots.length+'・午後'+pmSlots.length+'）';
  let body='';
  // 午前6枠（空き枠は募集中表示）
  body+='<div class="period-header am">午前</div>';
  for(var ai=0;ai<6;ai++){
    if(ai<amSlots.length){
      body+=renderSlot(amSlots[ai],NUM_LABELS[ai],key);
    }else{
      body+=renderEmptySlot(NUM_LABELS[ai],key);
    }
  }
  // 午後6枠（空き枠は募集中表示）
  body+='<div class="period-header pm">午後</div>';
  for(var pi=0;pi<6;pi++){
    if(pi<pmSlots.length){
      body+=renderSlot(pmSlots[pi],NUM_LABELS[pi],key);
    }else{
      body+=renderEmptySlot(NUM_LABELS[pi],key);
    }
  }
  document.getElementById('modal-body').innerHTML=body;
  document.querySelectorAll('.reserve-trigger').forEach(function(btn){
    btn.addEventListener('click',function(){
      var d=this.getAttribute('data-date');
      if(d) localStorage.setItem('eishinmaru_reserve_date',d);
      window.open('https://eishinmaru.github.io/eishinmaru-reserve/eishinmaru_reserve.html','_blank');
    });
  });
  document.getElementById('modal-overlay').classList.add('active');
}

function onGatherTimeSelect(i,val){
  if(val==='その他'){
    editingSlots[i]['gatherTime']='';
    editingSlots[i]['_otherMode']=true;
    buildSlotsEditor();
  }else if(val==='13:15'){
    editingSlots[i]['gatherTime']='13:15';
    editingSlots[i]['_otherMode']=false;
    buildSlotsEditor();
  }else{
    editingSlots[i]['gatherTime']=val;
    editingSlots[i]['_otherMode']=false;
    buildSlotsEditor();
  }
}
function calcDepartTime(t){
  if(!t)return '—';
  var m=t.match(/^(\d{1,2}):(\d{2})/);
  if(!m)return '—';
  var h=parseInt(m[1]),min=parseInt(m[2]);
  min+=30;if(min>=60){min-=60;h+=1;}if(h>=24)h-=24;
  return h+':'+(min<10?'0':'')+min;
}
function renderSlot(s,num,dateKey){
  const st=s.status;
  let cc='slot-card',nc='slot-num',badges='',sb='',displayTarget=s.target;
  if(st==='confirmed'){
    cc+=' confirmed';nc+=' confirmed';
    badges='<span class="badge confirmed">出船確定</span>';
    const pct=s.capacity?Math.round(((s.capacity-(s.remaining||0))/s.capacity)*100):70;
    sb='<div class="status-box confirmed"><div class="status-label">予約状況</div><div class="status-main">残り '+(s.remaining||'?')+' 名</div><div class="progress-bar"><div class="progress-fill confirmed" style="width:'+pct+'%"></div></div></div>';
  }else if(st==='recruiting'){
    badges='<span class="badge recruiting">出船未確定</span>';
    if(s.needMore){
      const pct=s.capacity?Math.round(((s.capacity-s.needMore)/s.capacity)*100):40;
      sb='<div class="status-box"><div class="status-label">出船確定まで</div><div class="status-main">あと '+s.needMore+' 名で確定</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
    }else if(s.minRequired){
      sb='<div class="status-box"><div class="status-label">最低出船人数</div><div class="status-main">'+s.minRequired+' 名で出船確定</div></div>';
    }else{
      sb='<div class="status-box"><div class="status-label">募集人数</div><div class="status-main">'+(s.capacity||'?')+' 名募集中</div></div>';
    }
  }else if(st==='full'){
    cc+=' full';nc+=' full';
    badges='<span class="badge full">満船</span>';
    sb='<div class="status-box full"><div class="status-label">予約状況</div><div class="status-main">受付終了しました</div></div>';
  }else if(st==='charter'){
    cc+=' charter';nc+=' charter';
    badges='<span class="badge charter">貸切</span>';
    sb='';
    displayTarget='貸切';
  }else if(st==='cancelled'){
    cc+=' cancelled';nc+=' cancelled';
    sb='<div class="status-box"><div class="status-label">運航状況</div><div class="status-main" style="color:#9e9e9e;">本日の便は中止となりました</div></div>';
  }
  var btnHtml='';
  if(st!=='cancelled'&&st!=='full'){
    var dkey=dateKey||'';
    btnHtml='<div class="slot-action-btns">'
      +'<a href="tel:08067942646" class="slot-btn tel-btn">電話</a>'
      +'<button class="slot-btn web-btn reserve-trigger" data-date="'+dkey+'">Web予約</button>'
      +'</div>';
  }
  return '<div class="'+cc+'"><div class="slot-top"><div class="'+nc+'">'+num+'</div><div class="slot-info"><div class="slot-target">'+displayTarget+'</div><div class="slot-time">集合 '+(s.gatherTime&&s.gatherTime!=='other_mode'?s.gatherTime:'—')+'　出船 '+(s.period==='pm'?'13:30':calcDepartTime(s.gatherTime||''))+'</div></div>'+btnHtml+'</div><div class="badges">'+badges+'</div>'+sb+'</div>';
}

    +'<button class="slot-btn web-btn reserve-trigger" data-date="'+dkey2+'">Web予約</button>'

function selectDay(key){
  selectedKey=key;
  buildAdminCalendar();
  const pts=key.split('-');
  const m=parseInt(pts[1]),d=parseInt(pts[2]);
  const dow=new Date(parseInt(pts[0]),m-1,d).getDay();
  const wdL=['日','月','火','水','木','金','土'];
  document.getElementById('edit-area-title').textContent=m+'月'+d+'日（'+wdL[dow]+'）の設定';
  const data=scheduleData[key]||{type:'normal',slots:[]};
  document.getElementById('holiday-toggle').checked=data.type==='holiday';
  toggleHoliday();
  editingSlots=(data.slots||[]).map(function(s){return Object.assign({},s);});
  buildSlotsEditor();
  document.getElementById('edit-area').style.display='block';
  document.getElementById('edit-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function toggleHoliday(){
  const isH=document.getElementById('holiday-toggle').checked;
  document.getElementById('slots-editor').style.display=isH?'none':'block';
  var addBtns=document.querySelectorAll('.add-slot-mini-btn');
  addBtns.forEach(function(b){b.style.display=isH?'none':'block';});
}

function buildSlotsEditor(){
  const c=document.getElementById('slots-editor');
  const amList=editingSlots.map(function(s,i){return {s:s,i:i};}).filter(function(x){return x.s.period==='am';});
  const pmList=editingSlots.map(function(s,i){return {s:s,i:i};}).filter(function(x){return x.s.period!=='am';});
  let html='';

  function renderEditCard(x,defaultMin){
    var s=x.s,i=x.i;
    var numIdx=amList.indexOf(x)!==-1?amList.indexOf(x):pmList.indexOf(x);
    var topts=TARGETS.map(function(t){return '<option value="'+t+'"'+(s.target===t?' selected':'')+'>'+t+'</option>';}).join('');
    var sopts=STATUS_LIST.map(function(st){return '<option value="'+st.v+'"'+(s.status===st.v?' selected':'')+'>'+st.l+'</option>';}).join('');
    var showC=['recruiting','confirmed'].includes(s.status);
    var showR=s.status==='confirmed';
    var showN=s.status==='recruiting';
    var card='<div class="slot-edit-card">';
    card+='<div class="slot-edit-header"><div class="slot-edit-num">'+(NUM_LABELS[numIdx]||numIdx+1)+'</div>';
    card+='<button class="slot-remove-btn" onclick="removeSlot('+i+')">削除</button></div>';
    card+='<div class="form-row">';
    card+='<div class="form-group"><label>釣物</label><select onchange="updateSlot('+i+',\'target\',this.value)">'+topts+'</select></div>';
    card+='<div class="form-group"><label>状態</label><select onchange="updateSlot('+i+',\'status\',this.value)">'+sopts+'</select></div>';
    card+='</div>';
    var isAM=s.period==='am';
    var amTimeOpts=['4:30','5:00','5:30','6:00','6:30','その他'].map(function(t){
      var sel=(t==='その他'?s._otherMode:s.gatherTime===t)?'selected':'';
      return '<option value="'+t+'" '+sel+'>'+t+'</option>';
    }).join('');
    var isOther=s._otherMode||false;
    card+='<div class="form-row">';
    if(isAM){
      card+='<div class="form-group"><label>集合時間</label><select onchange="onGatherTimeSelect('+i+',this.value)"><option value="">選択</option>'+amTimeOpts+'</select></div>';
      card+='<div class="form-group"><label>出船時間（自動）</label><input type="text" value="'+calcDepartTime(s.gatherTime||'')+'" readonly style="background:#f0f4f8;color:#888;"></div>';
      if(isOther){
        card+='</div><div class="form-row"><div class="form-group"><label>集合時間（手入力）</label><input type="text" value="'+(s.gatherTime||'')+'" placeholder="例: 7:00" onchange="updateSlot('+i+',\'gatherTime\',this.value)"></div>';
      }
    }else{
      card+='<div class="form-group"><label>集合時間</label><select onchange="onGatherTimeSelect('+i+',this.value)"><option value="13:15" selected>13:15（固定）</option><option value="その他"'+(isOther?' selected':'')+'>その他</option></select></div>';
      card+='<div class="form-group"><label>出船時間</label><input type="text" value="13:30" readonly style="background:#f0f4f8;color:#888;"></div>';
      if(isOther){
        card+='</div><div class="form-row"><div class="form-group"><label>集合時間（手入力）</label><input type="text" value="'+(s.gatherTime||'')+'" placeholder="例: 14:00" onchange="updateSlot('+i+',\'gatherTime\',this.value)"></div>';
      }
    }
    card+='</div>';
    if(showC){
      card+='<div class="form-row">';
      card+='<div class="form-group"><label>定員（名）</label><input type="number" value="'+(s.capacity||'')+'" min="1" max="30" onchange="updateSlot('+i+',\'capacity\',+this.value)"></div>';
      card+='<div class="form-group"><label>最低出船人数</label><input type="number" value="'+(s.minRequired!==undefined?s.minRequired:defaultMin)+'" min="1" max="30" onchange="updateSlot('+i+',\'minRequired\',+this.value)"></div>';
      if(showR)card+='<div class="form-group"><label>残席（名）</label><input type="number" value="'+(s.remaining||'')+'" min="0" max="30" onchange="updateSlot('+i+',\'remaining\',+this.value)"></div>';
      if(showN)card+='<div class="form-group"><label>確定まであと（名）</label><input type="number" value="'+(s.needMore||'')+'" min="1" max="30" onchange="updateSlot('+i+',\'needMore\',+this.value)"></div>';
      card+='</div>';
    }
    card+='</div>';
    return card;
  }

  html+='<div class="edit-period-header am">午前　最低出船 デフォルト4名</div>';
  amList.forEach(function(x){html+=renderEditCard(x,4);});
  html+='<button class="add-slot-mini-btn" onclick="addSlot(\'am\')">＋ 午前便を追加</button>';

  html+='<div class="edit-period-header pm">午後　最低出船 デフォルト5名</div>';
  pmList.forEach(function(x){html+=renderEditCard(x,5);});
  html+='<button class="add-slot-mini-btn pm-btn" onclick="addSlot(\'pm\')">＋ 午後便を追加</button>';

  c.innerHTML=html;
}
function updateSlot(i,f,v){
  editingSlots[i][f]=v;
  if(f==='status'||f==='_otherMode')buildSlotsEditor();
}
function removeSlot(i){editingSlots.splice(i,1);buildSlotsEditor();}
function addSlot(period){
  var p=period||'am';
  editingSlots.push({period:p,target:'タイラバ',status:'recruiting',gatherTime:'',capacity:6,minRequired:p==='am'?4:5});
  buildSlotsEditor();
}

function saveDay(){
  if(!selectedKey)return;
  const isH=document.getElementById('holiday-toggle').checked;
  if(isH){
    scheduleData[selectedKey]={type:'holiday',slots:[]};
  }else{
    scheduleData[selectedKey]={type:'normal',slots:editingSlots.map(function(s){return Object.assign({},s);})};
  }
  saveData(scheduleData);
  buildCalendar();
  buildAdminCalendar();
  const t=document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

buildCalendar();


</script>
